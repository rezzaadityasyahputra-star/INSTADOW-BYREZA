<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaSaver - Premium Downloader</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-gradient: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: #0f0c29;
            background: linear-gradient(to bottom right, #24243e, #302b63, #0f0c29);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            color: white;
            padding: 20px;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            z-index: 1000;
            transition: 0.5s cubic-bezier(0.77, 0.2, 0.05, 1.0);
            padding: 100px 20px;
            border-right: 1px solid var(--glass-border);
        }

        .sidebar.active { left: 0; }

        .sidebar-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 15px;
            width: 100%;
            border-radius: 12px;
            margin-bottom: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.3s;
        }

        .sidebar-btn:hover { background: white; color: #dc2743; transform: translateX(10px); }

        /* --- MENU TOGGLE (TITIK TIGA) --- */
        .menu-toggle {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 1001;
            cursor: pointer;
            width: 50px;
            height: 50px;
            background: var(--glass-bg);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
            border: 1px solid var(--glass-border);
        }

        .menu-toggle span { width: 6px; height: 6px; background: white; border-radius: 50%; transition: 0.3s; }

        /* --- MAIN CARD --- */
        .container { text-align: center; width: 100%; max-width: 500px; z-index: 10; }

        .insta-logo {
            font-size: 80px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: float 4s ease-in-out infinite;
            margin-bottom: 20px;
            display: inline-block;
        }

        @keyframes float { 
            0%, 100% { transform: translateY(0); } 
            50% { transform: translateY(-15px); } 
        }

        .downloader-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        input {
            width: 100%;
            padding: 15px 20px;
            border-radius: 15px;
            border: none;
            background: rgba(255, 255, 255, 0.9);
            margin-bottom: 20px;
            font-size: 14px;
            outline: none;
        }

        .btn-main {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: none;
            background: var(--primary-gradient);
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-main:hover { transform: scale(1.02); opacity: 0.9; }

        /* --- RESULT SECTION --- */
        #resultArea {
            margin-top: 25px;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .result-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 20px;
            text-align: left;
            font-size: 13px;
        }

        .info-row { display: flex; justify-content: space-between; margin-bottom: 10px; color: #ff9a9e; }

        .caption-box {
            max-height: 80px;
            overflow-y: auto;
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            white-space: pre-wrap;
        }

        .dl-link {
            display: block;
            text-align: center;
            background: #27ae60;
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.3s;
        }

        .dl-link:hover { background: #2ecc71; }

    </style>
</head>
<body>

    <!-- Tombol Titik Tiga -->
    <div class="menu-toggle" id="menuToggle">
        <span></span><span></span><span></span>
    </div>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <button class="sidebar-btn"><i class="fas fa-history"></i> Riwayat</button>
        <button class="sidebar-btn"><i class="fas fa-star"></i> Rating</button>
        <button class="sidebar-btn"><i class="fas fa-code"></i> API Doc</button>
    </div>

    <div class="container">
        <i class="fab fa-instagram insta-logo"></i>
        
        <div class="downloader-card">
            <h2 style="margin-bottom: 5px;">REZIGDOW</h2>
            <p style="font-size: 12px; opacity: 0.7; margin-bottom: 25px;">Masukkan link Video/Reel/Foto</p>

            <input type="text" id="instaUrl" placeholder="https://www.instagram.com/reels/...">
            
            <button class="btn-main" id="fetchBtn">
                <i class="fas fa-search"></i> CARI VIDEO 
            </button>

            <!-- Tempat Muncul Hasil API -->
            <div id="resultArea">
                <div class="result-box">
                    <div class="info-row">
                        <span id="userHandle">@username</span>
                        <span id="likeCount"><i class="fas fa-heart"></i> 0</span>
                    </div>
                    <div class="caption-box" id="captionText">Caption here...</div>
                    <a href="#" id="downloadLink" class="dl-link" target="_blank">
                        <i class="fas fa-download"></i> DOWNLOAD SEKARANG
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        const fetchBtn = document.getElementById('fetchBtn');
        const resultArea = document.getElementById('resultArea');

        // Toggle Sidebar
        menuToggle.addEventListener('click', () => {
            sidebar.classList.toggle('active');
        });

        // Close sidebar when clicking outside
        document.addEventListener('click', (e) => {
            if (!sidebar.contains(e.target) && !menuToggle.contains(e.target)) {
                sidebar.classList.remove('active');
            }
        });

        // Function Fetching API
        fetchBtn.addEventListener('click', async () => {
            const urlInput = document.getElementById('instaUrl').value;
            
            if (!urlInput) {
                alert("Masukkan URL Instagram dulu bosku!");
                return;
            }

            // Ubah tombol jadi loading
            fetchBtn.disabled = true;
            fetchBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> LOADING...';
            resultArea.style.display = 'none';

            try {
                const apiEndpoint = `https://api.sxtream.my.id/downloader/instagram?url=${encodeURIComponent(urlInput)}`;
                const response = await fetch(apiEndpoint);
                const data = await response.json();

                if (data.status === 200) {
                    // Isi Data ke UI
                    document.getElementById('userHandle').innerText = `@${data.result.username}`;
                    document.getElementById('likeCount').innerHTML = `<i class="fas fa-heart"></i> ${data.result.like.toLocaleString()}`;
                    document.getElementById('captionText').innerText = data.result.caption;
                    document.getElementById('downloadLink').href = data.result.url[0]; // Ambil URL pertama
                    
                    // Tampilkan area hasil
                    resultArea.style.display = 'block';
                } else {
                    alert("Gagal mengambil data. Pastikan link benar!");
                }
            } catch (error) {
                console.error(error);
                alert("Terjadi kesalahan koneksi ke API.");
            } finally {
                fetchBtn.disabled = false;
                fetchBtn.innerHTML = '<i class="fas fa-search"></i> PERIKSA LINK';
            }
        });
    </script>
</body>
</html>
